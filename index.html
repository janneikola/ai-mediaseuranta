// ==================== HELPERS ====================
function scoreColor(score) {
  if (score >= 85) return '#ef4444';
  if (score >= 65) return '#f59e0b';
  if (score >= 40) return '#3b82f6';
  return '#627d98';
}

function sentimentLabel(s) {
  if (s === 'pos') return '<span class="sent-pos text-xs">&#9650; Positiivinen</span>';
  if (s === 'neg') return '<span class="sent-neg text-xs">&#9660; Negatiivinen</span>';
  return '<span class="sent-neu text-xs">&#9679; Neutraali</span>';
}

function scoreRingSvg(score, size) {
  size = size || 48;
  var color = scoreColor(score);
  var r = (size / 2) - 4;
  var circ = 2 * Math.PI * r;
  var offset = circ - (score / 100) * circ;
  return '<div class="score-ring" style="width:' + size + 'px;height:' + size + 'px;">' +
    '<svg width="' + size + '" height="' + size + '" viewBox="0 0 ' + size + ' ' + size + '">' +
    '<circle cx="' + (size/2) + '" cy="' + (size/2) + '" r="' + r + '" fill="none" stroke="#243b5340" stroke-width="3"/>' +
    '<circle cx="' + (size/2) + '" cy="' + (size/2) + '" r="' + r + '" fill="none" stroke="' + color + '" stroke-width="3" stroke-dasharray="' + circ + '" stroke-dashoffset="' + offset + '" stroke-linecap="round"/>' +
    '</svg>' +
    '<span class="score-text" style="color:' + color + '">' + score + '</span>' +
    '</div>';
}

function escapeHtml(text) {
  var div = document.createElement('div');
  div.textContent = text;
  return div.textContent;
}

function sparkBars(count) {
  var bars = '';
  for (var i = 0; i < count; i++) {
    var h = Math.max(15, Math.random() * 100);
    bars += '<span class="spark-bar" style="height:' + h + '%;opacity:' + (0.4 + h/200) + ';flex:1;"></span>';
  }
  return bars;
}

// ==================== DOM BUILDING ====================
function buildElement(tag, attrs, children) {
  var el = document.createElement(tag);
  if (attrs) {
    Object.keys(attrs).forEach(function(key) {
      if (key === 'className') el.className = attrs[key];
      else if (key === 'style' && typeof attrs[key] === 'string') el.setAttribute('style', attrs[key]);
      else if (key.startsWith('on')) el[key] = attrs[key];
      else el.setAttribute(key, attrs[key]);
    });
  }
  if (children) {
    if (typeof children === 'string') {
      el.textContent = children;
    } else if (Array.isArray(children)) {
      children.forEach(function(child) {
        if (child) {
          if (typeof child === 'string') el.appendChild(document.createTextNode(child));
          else el.appendChild(child);
        }
      });
    } else {
      el.appendChild(children);
    }
  }
  return el;
}

function renderAlerts() {
  var container = document.createElement('div');
  container.id = 'view-alerts';
  container.className = 'view';

  var levelConfig = {
    critical: { color:'#ef4444', bg:'rgba(239,68,68,0.08)', label:'Kriittinen', border:'#ef444440' },
    important: { color:'#f59e0b', bg:'rgba(245,158,11,0.06)', label:'Tarkea', border:'#f59e0b30' },
    normal: { color:'#3b82f6', bg:'rgba(59,130,246,0.06)', label:'Normaali', border:'#3b82f620' },
    low: { color:'#627d98', bg:'transparent', label:'Matala', border:'#627d9815' }
  };

  var html = '<div class="flex items-center justify-between mb-5">' +
    '<h3 class="section-title">Halytykset</h3>' +
    '<div class="flex gap-2">' +
    '<button class="tag-pill bg-crit-500/20 text-crit-500 cursor-pointer">Kriittinen <span class="ml-1 font-mono">3</span></button>' +
    '<button class="tag-pill bg-warn-500/20 text-warn-500 cursor-pointer">Tarkea <span class="ml-1 font-mono">5</span></button>' +
    '<button class="tag-pill bg-accent-500/20 text-accent-400 cursor-pointer">Normaali <span class="ml-1 font-mono">12</span></button>' +
    '<button class="tag-pill bg-base-600/20 text-base-400 cursor-pointer">Matala <span class="ml-1 font-mono">27</span></button></div></div>' +
    '<div class="space-y-2">';

  alerts.forEach(function(a, i) {
    var cfg = levelConfig[a.level];
    html += '<div class="card flex items-stretch gap-0 overflow-hidden animate-slide-in" style="animation-delay:' + (i*0.04) + 's;background:' + cfg.bg + ';border-color:' + cfg.border + ';">' +
      '<div class="alert-level-bar" style="background:' + cfg.color + ';"></div>' +
      '<div class="flex items-center gap-4 p-4 flex-1 min-w-0">' +
      scoreRingSvg(a.score, 40) +
      '<div class="flex-1 min-w-0"><p class="text-sm font-medium leading-snug">' + escapeHtml(a.title) + '</p>' +
      '<div class="flex items-center gap-2 mt-1">' +
      '<span class="text-xs" style="color:' + cfg.color + ';">' + cfg.label + '</span>' +
      '<span class="text-xs text-base-600">&middot;</span>' +
      '<span class="text-xs text-base-500">' + escapeHtml(a.source) + '</span>' +
      '<span class="text-xs text-base-600">&middot;</span>' +
      '<span class="text-xs text-base-500">' + escapeHtml(a.time) + '</span></div></div>' +
      '<div class="flex gap-1 flex-shrink-0"><button class="action-btn">Avaa</button><button class="action-btn">Hylkaa</button></div></div></div>';
  });
  html += '</div>';

  setStaticContent(container, html);
  return container;
}

// Tab switching
document.querySelectorAll('.tab-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    var tab = this.getAttribute('data-tab');
    document.querySelectorAll('.view').forEach(function(v) { v.classList.remove('active'); });
    document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
    document.getElementById('view-' + tab).classList.add('active');
    this.classList.add('active');
    window.scrollTo(0, 0);
  });
});
